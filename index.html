<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>KBHCCD Master Plan – Progress Dashboard</title>
<style>
/* ============================================================
   BRAND FONTS — Avenir with system fallbacks
   ============================================================ */
@font-face {
  font-family: 'Avenir';
  src: url('assets/fonts/Avenir.ttc') format('truetype');
  font-weight: 300;
  font-style: normal;
}
@font-face {
  font-family: 'Avenir';
  src: url('assets/fonts/Avenir.ttc') format('truetype');
  font-weight: 400;
  font-style: normal;
}
@font-face {
  font-family: 'Avenir';
  src: url('assets/fonts/Avenir.ttc') format('truetype');
  font-weight: 500;
  font-style: normal;
}
@font-face {
  font-family: 'Avenir';
  src: url('assets/fonts/Avenir.ttc') format('truetype');
  font-weight: 700;
  font-style: normal;
}
@font-face {
  font-family: 'Avenir';
  src: url('assets/fonts/Avenir.ttc') format('truetype');
  font-weight: 800;
  font-style: normal;
}
@font-face {
  font-family: 'Avenir';
  src: url('assets/fonts/Avenir.ttc') format('truetype');
  font-weight: 900;
  font-style: normal;
}

/* ============================================================
   BRAND COLORS
   ============================================================ */
:root {
  --red: #ee3124;
  --blue: #00b4ed;
  --dark-blue: #253948;
  --gray: #64696f;
  --light-gray: #f4f6f8;
  --white: #ffffff;
  --success: #27ae60;
  --warning: #f39c12;
  --card-shadow: 0 2px 12px rgba(37, 57, 72, 0.08);
  --card-hover: 0 6px 24px rgba(37, 57, 72, 0.15);
  --radius: 12px;
  --ease: 0.25s ease;
}

/* ============================================================
   RESET & BASE
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Avenir', 'Segoe UI', system-ui, -apple-system, sans-serif;
  color: var(--gray);
  background: var(--light-gray);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}
h1, h2, h3, h4 { color: var(--dark-blue); font-weight: 800; line-height: 1.2; }

/* ============================================================
   HEADER
   ============================================================ */
.site-header {
  background: var(--white);
  border-bottom: 3px solid var(--red);
  position: sticky; top: 0; z-index: 100;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.header-inner {
  max-width: 1400px; margin: 0 auto;
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 32px; gap: 24px; flex-wrap: wrap;
}
.header-logo img { height: 52px; width: auto; }
.header-right { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
.memo-selector {
  font-family: inherit; font-size: 14px; padding: 8px 14px;
  border: 2px solid var(--blue); border-radius: 8px;
  background: var(--white); color: var(--dark-blue);
  font-weight: 500; cursor: pointer; transition: var(--ease);
}
.memo-selector:hover { background: rgba(0,180,236,0.08); }
.header-date { font-size: 14px; color: var(--gray); font-weight: 500; }

/* ============================================================
   LAYOUT
   ============================================================ */
.container { max-width: 1400px; margin: 0 auto; padding: 28px 32px 60px; }

/* ============================================================
   HERO
   ============================================================ */
.hero {
  background: linear-gradient(135deg, var(--dark-blue) 0%, #1a2d3d 100%);
  border-radius: var(--radius); padding: 36px 40px; margin-bottom: 28px;
  color: var(--white);
  display: grid; grid-template-columns: 1fr auto; gap: 32px; align-items: center;
  position: relative; overflow: hidden;
}
.hero::before {
  content: ''; position: absolute; top: -60px; right: -60px;
  width: 280px; height: 280px;
  background: radial-gradient(circle, rgba(0,180,236,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.hero-title { color: var(--white); font-size: 28px; margin-bottom: 6px; }
.hero-subtitle { color: rgba(255,255,255,0.75); font-size: 15px; font-weight: 400; max-width: 700px; }

/* SVG ring */
.hero-ring-wrap {
  width: 150px; height: 150px; position: relative; flex-shrink: 0;
}
.hero-ring-wrap svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.ring-bg { fill: none; stroke: rgba(255,255,255,0.12); stroke-width: 10; }
.ring-fill {
  fill: none; stroke: var(--blue); stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1);
}
.hero-pct {
  position: absolute; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  color: var(--white); font-weight: 800; font-size: 32px; line-height: 1;
  pointer-events: none;
}
.hero-pct small {
  font-size: 11px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 1px; margin-top: 4px; opacity: 0.7;
}

/* ============================================================
   KPI CARDS
   ============================================================ */
.kpi-row {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
  gap: 16px; margin-bottom: 28px;
}
.kpi-card {
  background: var(--white); border-radius: var(--radius); padding: 22px 24px;
  box-shadow: var(--card-shadow); text-align: center; transition: var(--ease);
  border-top: 4px solid transparent;
}
.kpi-card:hover { box-shadow: var(--card-hover); transform: translateY(-2px); }
.kpi-card.blue-top   { border-top-color: var(--blue); }
.kpi-card.green-top  { border-top-color: var(--success); }
.kpi-card.gray-top   { border-top-color: #b0b0b0; }
.kpi-card.yellow-top { border-top-color: var(--warning); }
.kpi-card.red-top    { border-top-color: var(--red); }
.kpi-value {
  font-size: 40px; font-weight: 900; line-height: 1;
  color: var(--dark-blue);
}
.kpi-value.green  { color: var(--success); }
.kpi-value.yellow { color: var(--warning); }
.kpi-value.red    { color: var(--red); }
.kpi-value.blue   { color: var(--blue); }
.kpi-label {
  font-size: 12px; color: var(--gray); margin-top: 6px;
  font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
}

/* ============================================================
   SECTION HEADERS
   ============================================================ */
.section-header { display: flex; align-items: center; gap: 12px; margin: 32px 0 18px; }
.section-header h2 { font-size: 22px; white-space: nowrap; }
.section-line {
  flex: 1; height: 2px;
  background: linear-gradient(90deg, var(--blue), transparent); border-radius: 2px;
}

/* ============================================================
   MILESTONES TIMELINE
   ============================================================ */
.milestones-wrap {
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--card-shadow); padding: 28px 24px; margin-bottom: 28px;
}
.milestones-track {
  display: flex; gap: 0; overflow-x: auto; padding: 12px 0 4px;
  -webkit-overflow-scrolling: touch;
}
.milestone {
  position: relative; flex: 1 0 150px; max-width: 210px;
  text-align: center; padding: 0 10px;
}
.milestone::before {
  content: ''; position: absolute; top: 18px; left: 0; right: 0;
  height: 3px; background: #dde1e6; z-index: 0;
}
.milestone:first-child::before { left: 50%; }
.milestone:last-child::before  { right: 50%; }
.ms-dot {
  width: 36px; height: 36px; border-radius: 50%;
  margin: 0 auto 10px;
  display: flex; align-items: center; justify-content: center;
  position: relative; z-index: 1;
  font-size: 18px; color: var(--white);
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
.ms-dot.complete    { background: var(--success); }
.ms-dot.in-progress { background: var(--blue); animation: pulse 2s infinite; }
.ms-dot.upcoming    { background: #ccc; }
@keyframes pulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(0,180,236,0.4); }
  50%      { box-shadow: 0 0 0 10px rgba(0,180,236,0); }
}
.ms-label { font-size: 12px; font-weight: 600; color: var(--dark-blue); line-height: 1.3; margin-bottom: 3px; }
.ms-date  { font-size: 11px; color: var(--gray); }

/* ============================================================
   CHARTS (Pure CSS / SVG)
   ============================================================ */
.charts-row {
  display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 28px;
}
.chart-card {
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--card-shadow); padding: 24px;
}
.chart-card h3 { font-size: 16px; margin-bottom: 18px; }

/* Bar chart (horizontal CSS bars) */
.bar-chart { display: flex; flex-direction: column; gap: 12px; }
.bar-row { display: flex; align-items: center; gap: 10px; }
.bar-label {
  width: 160px; font-size: 13px; font-weight: 600;
  color: var(--dark-blue); text-align: right; flex-shrink: 0;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.bar-track {
  flex: 1; height: 22px; background: #eaedf0; border-radius: 11px;
  overflow: hidden; position: relative;
}
.bar-fill {
  height: 100%; border-radius: 11px;
  transition: width 1s cubic-bezier(.4,0,.2,1);
  position: relative;
  display: flex; align-items: center; justify-content: flex-end; padding-right: 8px;
  font-size: 11px; font-weight: 800; color: var(--white);
  min-width: 36px;
}
.bar-fill.green  { background: linear-gradient(90deg, var(--success), #2ecc71); }
.bar-fill.yellow { background: linear-gradient(90deg, var(--warning), #f1c40f); }
.bar-fill.gray   { background: #ccc; }
.bar-fill.blue   { background: linear-gradient(90deg, var(--blue), #5bc0eb); }

/* Doughnut chart (SVG) */
.doughnut-wrap { display: flex; align-items: center; justify-content: center; gap: 24px; flex-wrap: wrap; }
.doughnut-svg { width: 200px; height: 200px; }
.doughnut-svg circle { transition: stroke-dashoffset 1s cubic-bezier(.4,0,.2,1); }
.doughnut-legend { display: flex; flex-direction: column; gap: 10px; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 14px; }
.legend-dot {
  width: 14px; height: 14px; border-radius: 4px; flex-shrink: 0;
}
.legend-label { font-weight: 600; color: var(--dark-blue); }
.legend-count { font-weight: 400; color: var(--gray); }

/* ============================================================
   COMPONENT CARDS
   ============================================================ */
.components-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
  gap: 20px; margin-bottom: 28px;
}
.comp-card {
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--card-shadow); overflow: hidden; transition: var(--ease);
}
.comp-card:hover { box-shadow: var(--card-hover); transform: translateY(-2px); }
.comp-card-header {
  padding: 18px 22px; display: flex; align-items: center;
  justify-content: space-between; gap: 12px;
  border-bottom: 1px solid #eef1f4;
}
.comp-num {
  width: 38px; height: 38px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-weight: 900; font-size: 16px; color: var(--white); flex-shrink: 0;
}
.comp-num.on-track   { background: var(--success); }
.comp-num.at-risk    { background: var(--warning); }
.comp-num.paused     { background: #b0b0b0; }
.comp-num.complete   { background: var(--blue); }

.comp-title-wrap { flex: 1; min-width: 0; }
.comp-title {
  font-size: 16px; font-weight: 800; color: var(--dark-blue);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.comp-full-name {
  font-size: 12px; color: var(--gray);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.status-badge {
  font-size: 11px; font-weight: 700; padding: 4px 12px;
  border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; white-space: nowrap;
}
.status-badge.on-track   { background: rgba(39,174,96,0.12); color: var(--success); }
.status-badge.at-risk    { background: rgba(243,156,18,0.12); color: var(--warning); }
.status-badge.paused     { background: rgba(0,0,0,0.06); color: #888; }
.status-badge.complete   { background: rgba(0,180,236,0.12); color: var(--blue); }

.comp-card-body { padding: 18px 22px; }

/* Progress bar */
.progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.progress-track {
  flex: 1; height: 10px; background: #eaedf0; border-radius: 10px;
  overflow: hidden; position: relative;
}
.progress-fill {
  height: 100%; border-radius: 10px;
  transition: width 0.8s cubic-bezier(.4,0,.2,1); position: relative;
}
.progress-fill.on-track   { background: linear-gradient(90deg, var(--success), #2ecc71); }
.progress-fill.at-risk    { background: linear-gradient(90deg, var(--warning), #f1c40f); }
.progress-fill.paused     { background: #ccc; }
.progress-fill.complete   { background: linear-gradient(90deg, var(--blue), #5bc0eb); }
.progress-fill::after {
  content: ''; position: absolute; inset: 0;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3)); border-radius: 10px;
}
.progress-pct { font-size: 14px; font-weight: 800; color: var(--dark-blue); min-width: 42px; text-align: right; }
.trend { font-size: 14px; font-weight: 800; }
.trend.up   { color: var(--success); }
.trend.flat { color: var(--gray); }
.trend.down { color: var(--red); }

/* Expandable detail sections */
.comp-details { padding: 0 22px 18px; }
.detail-section { margin-bottom: 10px; }
.detail-toggle {
  display: flex; align-items: center; gap: 8px; width: 100%;
  background: none; border: none; cursor: pointer; font-family: inherit;
  font-size: 13px; font-weight: 700; color: var(--dark-blue);
  padding: 6px 0; text-align: left;
}
.detail-toggle .chevron { transition: transform 0.2s; font-size: 11px; }
.detail-toggle.open .chevron { transform: rotate(90deg); }
.detail-count {
  background: var(--light-gray); color: var(--gray);
  font-size: 11px; padding: 1px 8px; border-radius: 10px; font-weight: 600;
}
.detail-list {
  list-style: none; padding: 0 0 0 6px;
  max-height: 0; overflow: hidden; transition: max-height 0.35s ease;
}
.detail-list.open { max-height: 800px; }
.detail-list li {
  font-size: 13px; color: var(--gray); padding: 4px 0 4px 14px;
  position: relative; line-height: 1.45;
}
.detail-list li::before {
  content: ''; position: absolute; left: 0; top: 11px;
  width: 6px; height: 6px; border-radius: 50%;
}
.detail-list.successes li::before { background: var(--success); }
.detail-list.critical li::before  { background: var(--red); }
.detail-list.other li::before     { background: var(--blue); }

.comp-note { font-size: 14px; color: #999; font-style: italic; text-align: center; padding: 16px 0; }

/* ============================================================
   ARCHIVE PANEL
   ============================================================ */
.archive-panel {
  background: var(--white); border-radius: var(--radius);
  box-shadow: var(--card-shadow); padding: 24px 28px; margin-top: 12px;
}
.archive-panel h3 { font-size: 16px; margin-bottom: 14px; }
.archive-list { list-style: none; }
.archive-list li {
  padding: 10px 0; border-bottom: 1px solid #eef1f4;
  display: flex; align-items: center; justify-content: space-between;
}
.archive-list li:last-child { border: none; }
.archive-list .a-date { font-weight: 700; color: var(--dark-blue); font-size: 14px; }
.archive-list .a-title { font-size: 13px; color: var(--gray); }
.archive-btn {
  font-family: inherit; font-size: 12px; font-weight: 700;
  padding: 6px 16px; border: 2px solid var(--blue); border-radius: 8px;
  background: transparent; color: var(--blue); cursor: pointer; transition: var(--ease);
}
.archive-btn:hover { background: var(--blue); color: var(--white); }
.archive-btn.active { background: var(--blue); color: var(--white); }

/* ============================================================
   FOOTER
   ============================================================ */
.site-footer { text-align: center; padding: 24px; font-size: 12px; color: #aaa; }

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width: 900px) {
  .header-inner { padding: 12px 16px; }
  .container { padding: 16px; }
  .hero { grid-template-columns: 1fr; padding: 24px; text-align: center; }
  .hero-ring-wrap { margin: 0 auto; }
  .hero-title { font-size: 22px; }
  .components-grid { grid-template-columns: 1fr; }
  .charts-row { grid-template-columns: 1fr; }
  .kpi-row { grid-template-columns: repeat(2, 1fr); }
  .bar-label { width: 100px; font-size: 11px; }
}
@media (max-width: 500px) {
  .kpi-row { grid-template-columns: 1fr; }
  .header-logo img { height: 36px; }
}
@media print {
  .site-header { position: static; box-shadow: none; }
  .comp-card:hover, .kpi-card:hover { transform: none; box-shadow: none; }
  .memo-selector, .archive-btn { display: none; }
  body { background: #fff; }
}
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <a href="#" class="header-logo">
      <img src="assets/images/logo.png" alt="KBHCCD Master Plan" />
    </a>
    <div class="header-right">
      <select class="memo-selector" id="memoSelector" aria-label="Select weekly memo"></select>
      <span class="header-date" id="headerDate"></span>
    </div>
  </div>
</header>

<!-- MAIN -->
<main class="container">

  <!-- HERO -->
  <section class="hero">
    <div>
      <h1 class="hero-title" id="heroTitle">Master Plan Progress</h1>
      <p class="hero-subtitle" id="heroSubtitle"></p>
    </div>
    <div class="hero-ring-wrap">
      <svg viewBox="0 0 120 120">
        <circle class="ring-bg" cx="60" cy="60" r="50"></circle>
        <circle class="ring-fill" id="overallRing" cx="60" cy="60" r="50"
                stroke-dasharray="314.16" stroke-dashoffset="314.16"></circle>
      </svg>
      <div class="hero-pct">
        <span id="heroPct">0%</span>
        <small>Overall</small>
      </div>
    </div>
  </section>

  <!-- KPI CARDS -->
  <div class="kpi-row" id="kpiRow"></div>

  <!-- MILESTONES -->
  <div class="section-header">
    <h2>Key Milestones</h2>
    <div class="section-line"></div>
  </div>
  <div class="milestones-wrap">
    <div class="milestones-track" id="milestones"></div>
  </div>

  <!-- CHARTS -->
  <div class="section-header">
    <h2>Component Overview</h2>
    <div class="section-line"></div>
  </div>
  <div class="charts-row">
    <div class="chart-card">
      <h3>Progress by Component</h3>
      <div class="bar-chart" id="barChart"></div>
    </div>
    <div class="chart-card">
      <h3>Status Distribution</h3>
      <div class="doughnut-wrap" id="doughnutChart"></div>
    </div>
  </div>

  <!-- COMPONENT CARDS -->
  <div class="section-header">
    <h2>Component Details</h2>
    <div class="section-line"></div>
  </div>
  <div class="components-grid" id="componentsGrid"></div>

  <!-- ARCHIVE -->
  <div class="section-header">
    <h2>Memo Archive</h2>
    <div class="section-line"></div>
  </div>
  <div class="archive-panel" id="archivePanel"></div>

</main>

<footer class="site-footer">
  Kay Bailey Hutchison Convention Center Dallas &mdash; Master Plan Progress Dashboard
</footer>

<!-- DATA -->
<script src="data/memos.js"></script>

<!-- APP -->
<script>
(function () {
  "use strict";

  var STATUS_LABELS = {
    "on-track": "On Track",
    "at-risk": "At Risk",
    "paused": "Paused",
    "complete": "Complete"
  };
  var TREND_ARROWS = { up: "\u25B2", flat: "\u25AC", down: "\u25BC" };
  var STATUS_COLORS = {
    "on-track": { css: "green",  hex: "#27ae60" },
    "at-risk":  { css: "yellow", hex: "#f39c12" },
    "paused":   { css: "gray",   hex: "#cccccc" },
    "complete":  { css: "blue",   hex: "#00b4ed" }
  };

  // ---- Init ----
  function init() {
    populateSelector();
    renderMemo(getLatestMemo());
  }

  function populateSelector() {
    var sel = document.getElementById("memoSelector");
    MEMOS.slice().reverse().forEach(function (m) {
      var opt = document.createElement("option");
      opt.value = m.id;
      opt.textContent = m.date;
      sel.appendChild(opt);
    });
    sel.addEventListener("change", function () {
      renderMemo(getMemoById(sel.value));
    });
  }

  // ---- Master render ----
  function renderMemo(memo) {
    document.getElementById("headerDate").textContent = "Report: " + memo.date;
    document.getElementById("heroTitle").textContent = memo.title;
    document.getElementById("heroSubtitle").textContent = memo.summary;
    renderRing(memo.overallProgress);
    renderKPIs(memo);
    renderMilestones(memo.keyMilestones);
    renderBarChart(memo);
    renderDoughnut(memo);
    renderComponents(memo);
    renderArchive(memo.id);
  }

  // ---- Overall ring (SVG) ----
  function renderRing(pct) {
    var circ = 2 * Math.PI * 50; // 314.16
    var offset = circ - (circ * pct / 100);
    var ring = document.getElementById("overallRing");
    // Force reflow so transition fires
    ring.style.transition = "none";
    ring.setAttribute("stroke-dashoffset", circ);
    ring.offsetHeight; // reflow
    ring.style.transition = "stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)";
    ring.setAttribute("stroke-dashoffset", offset);
    document.getElementById("heroPct").textContent = pct + "%";
  }

  // ---- KPIs ----
  function renderKPIs(memo) {
    var comps = memo.components;
    var active = comps.filter(function(c){ return c.status !== "paused"; }).length;
    var paused = comps.filter(function(c){ return c.status === "paused"; }).length;
    var atRisk = comps.filter(function(c){ return c.status === "at-risk"; }).length;
    var successes = comps.reduce(function(s,c){ return s + c.successes.length; }, 0);
    var critical = comps.reduce(function(s,c){ return s + c.criticalPath.length; }, 0);

    var cards = [
      { value: comps.length, label: "Total Components", cls: "blue", top: "blue-top" },
      { value: active, label: "Active", cls: "green", top: "green-top" },
      { value: paused, label: "Paused", cls: "", top: "gray-top" },
      { value: atRisk, label: "At Risk", cls: "yellow", top: "yellow-top" },
      { value: successes, label: "Successes This Week", cls: "green", top: "green-top" },
      { value: critical, label: "Critical Path Items", cls: "red", top: "red-top" }
    ];

    document.getElementById("kpiRow").innerHTML = cards.map(function (c) {
      return '<div class="kpi-card ' + c.top + '">' +
        '<div class="kpi-value ' + c.cls + '">' + c.value + '</div>' +
        '<div class="kpi-label">' + c.label + '</div></div>';
    }).join("");
  }

  // ---- Milestones ----
  function renderMilestones(milestones) {
    var icons = { "complete": "\u2713", "in-progress": "\u25CF", "upcoming": "\u25CB" };
    document.getElementById("milestones").innerHTML = milestones.map(function (m) {
      return '<div class="milestone">' +
        '<div class="ms-dot ' + m.status + '">' + icons[m.status] + '</div>' +
        '<div class="ms-label">' + m.label + '</div>' +
        '<div class="ms-date">' + m.date + '</div></div>';
    }).join("");
  }

  // ---- Bar chart (CSS) ----
  function renderBarChart(memo) {
    var el = document.getElementById("barChart");
    el.innerHTML = memo.components.map(function (c) {
      var colorCls = STATUS_COLORS[c.status] ? STATUS_COLORS[c.status].css : "gray";
      return '<div class="bar-row">' +
        '<div class="bar-label">C' + c.number + ' ' + c.shortName + '</div>' +
        '<div class="bar-track">' +
          '<div class="bar-fill ' + colorCls + '" style="width:0%">' + c.progress + '%</div>' +
        '</div></div>';
    }).join("");

    // Animate after paint
    requestAnimationFrame(function () {
      requestAnimationFrame(function () {
        var fills = el.querySelectorAll(".bar-fill");
        memo.components.forEach(function (c, i) {
          fills[i].style.width = Math.max(c.progress, 4) + "%";
        });
      });
    });
  }

  // ---- Doughnut (SVG) ----
  function renderDoughnut(memo) {
    var counts = {};
    memo.components.forEach(function (c) {
      counts[c.status] = (counts[c.status] || 0) + 1;
    });
    var total = memo.components.length;
    var r = 70, circ = 2 * Math.PI * r;
    var offset = 0;

    var segments = "";
    var legendHtml = "";
    var statuses = Object.keys(counts);

    statuses.forEach(function (s) {
      var frac = counts[s] / total;
      var dash = circ * frac;
      var hex = STATUS_COLORS[s] ? STATUS_COLORS[s].hex : "#ccc";
      segments += '<circle cx="90" cy="90" r="' + r + '" fill="none" ' +
        'stroke="' + hex + '" stroke-width="28" ' +
        'stroke-dasharray="' + dash + ' ' + (circ - dash) + '" ' +
        'stroke-dashoffset="' + (-offset) + '" />';
      offset += dash;

      legendHtml += '<div class="legend-item">' +
        '<div class="legend-dot" style="background:' + hex + '"></div>' +
        '<span class="legend-label">' + STATUS_LABELS[s] + '</span>' +
        '<span class="legend-count">(' + counts[s] + ')</span></div>';
    });

    document.getElementById("doughnutChart").innerHTML =
      '<svg class="doughnut-svg" viewBox="0 0 180 180">' + segments + '</svg>' +
      '<div class="doughnut-legend">' + legendHtml + '</div>';
  }

  // ---- Component cards ----
  function renderComponents(memo) {
    var grid = document.getElementById("componentsGrid");
    grid.innerHTML = memo.components.map(function (c) {
      var isPaused = c.status === "paused";
      var details = isPaused ? "" : buildDetails(c);
      var body;
      if (isPaused) {
        body = '<div class="comp-note">' + (c.note || "Paused") + '</div>';
      } else {
        body = '<div class="progress-row">' +
          '<div class="progress-track"><div class="progress-fill ' + c.status + '" style="width:' + c.progress + '%"></div></div>' +
          '<span class="progress-pct">' + c.progress + '%</span>' +
          '<span class="trend ' + c.trend + '">' + TREND_ARROWS[c.trend] + '</span></div>';
      }
      return '<div class="comp-card">' +
        '<div class="comp-card-header">' +
          '<div class="comp-num ' + c.status + '">' + c.number + '</div>' +
          '<div class="comp-title-wrap">' +
            '<div class="comp-title">' + c.shortName + '</div>' +
            '<div class="comp-full-name">' + c.name + '</div>' +
          '</div>' +
          '<span class="status-badge ' + c.status + '">' + STATUS_LABELS[c.status] + '</span>' +
        '</div>' +
        '<div class="comp-card-body">' + body + '</div>' +
        (details ? '<div class="comp-details">' + details + '</div>' : '') +
      '</div>';
    }).join("");

    // Wire toggles
    grid.querySelectorAll(".detail-toggle").forEach(function (btn) {
      btn.addEventListener("click", function () {
        btn.classList.toggle("open");
        btn.nextElementSibling.classList.toggle("open");
      });
    });
  }

  function buildDetails(comp) {
    var html = "";
    if (comp.successes.length)    html += detailBlock("Successes", "successes", comp.successes);
    if (comp.criticalPath.length) html += detailBlock("Critical Path Items", "critical", comp.criticalPath);
    if (comp.otherActivity.length) html += detailBlock("Other Activity", "other", comp.otherActivity);
    return html;
  }

  function detailBlock(title, cls, items) {
    return '<div class="detail-section">' +
      '<button class="detail-toggle" aria-expanded="false">' +
        '<span class="chevron">&#9654;</span> ' + title +
        ' <span class="detail-count">' + items.length + '</span>' +
      '</button>' +
      '<ul class="detail-list ' + cls + '">' +
        items.map(function (i) { return '<li>' + i + '</li>'; }).join("") +
      '</ul></div>';
  }

  // ---- Archive ----
  function renderArchive(currentId) {
    var panel = document.getElementById("archivePanel");
    var list = MEMOS.slice().reverse().map(function (m) {
      var isActive = m.id === currentId;
      return '<li><div><span class="a-date">' + m.date + '</span>' +
        '<span class="a-title"> &mdash; ' + m.title + '</span></div>' +
        '<button class="archive-btn' + (isActive ? ' active' : '') + '" ' +
        'data-memo="' + m.id + '">' + (isActive ? 'Viewing' : 'View') + '</button></li>';
    }).join("");

    panel.innerHTML = '<h3>Memo Archive' + (MEMOS.length > 1 ? ' (' + MEMOS.length + ' reports)' : '') + '</h3>' +
      (MEMOS.length <= 1 ? '<p style="color:var(--gray);font-size:14px;margin-bottom:12px;">Weekly memos will appear here as they are added.</p>' : '') +
      '<ul class="archive-list">' + list + '</ul>';

    panel.querySelectorAll(".archive-btn").forEach(function (btn) {
      btn.addEventListener("click", function () {
        var sel = document.getElementById("memoSelector");
        sel.value = btn.dataset.memo;
        sel.dispatchEvent(new Event("change"));
        window.scrollTo({ top: 0, behavior: "smooth" });
      });
    });
  }

  // ---- Boot ----
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
